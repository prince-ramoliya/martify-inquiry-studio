<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Force the document HTML to always re-validate so phones never serve a stale shell. Hashed JS/CSS assets are cached by Vite naturally. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>MARTIFY Super Mart — Pick smart. Shop smart.</title>
    <meta name="description" content="Curated supermarket from Surat — beauty, kitchen, decor, electronics, stationary, toys. Browse, save & inquire on WhatsApp." />
    <link rel="canonical" href="/" />

    <meta property="og:title" content="MARTIFY Super Mart — Pick smart. Shop smart." />
    <meta property="og:description" content="Curated supermarket from Surat. Browse, save & inquire on WhatsApp." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fast font loading without blocking first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" /></noscript>

    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="/src/assets/hero-banner-1.webp" fetchpriority="high" />
  </head>

  <body>
    <div id="root">
      <div style="min-height:100vh;background:#fff;font-family:Manrope,system-ui,sans-serif;color:#0f172a">
        <div style="height:80px;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid #eef2f7">
          <div style="width:44px;height:44px;border-radius:999px;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:22px;color:#1d4ed8">☰</div>
          <div style="font-weight:900;font-size:26px;letter-spacing:-.04em;color:#1d4ed8">MARTIFY</div>
          <div style="width:44px;height:44px;border-radius:999px;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:19px">♡</div>
        </div>
        <div style="height:42vh;min-height:280px;background:linear-gradient(135deg,rgba(15,23,42,.78),rgba(29,78,216,.5)),url('/src/assets/hero-banner-1.webp') center/cover;padding:28px 16px;display:flex;flex-direction:column;justify-content:flex-end;gap:12px;color:#fff">
          <div style="font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);width:max-content;border-radius:999px;padding:7px 10px">New Season · 2025</div>
          <h1 style="margin:0;max-width:12ch;font-size:28px;line-height:1.05;letter-spacing:-.04em">Smart picks for homes.</h1>
          <div style="width:max-content;border-radius:999px;background:#1d4ed8;color:#fff;font-weight:800;padding:12px 20px;box-shadow:0 12px 34px rgba(29,78,216,.35)">Browse the shop</div>
        </div>
        <div style="padding:26px 16px 10px;display:flex;align-items:end;justify-content:space-between;gap:16px">
          <div>
            <div style="font-size:11px;color:#1d4ed8;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Shop by Category</div>
            <h2 style="margin:0;font-size:24px;line-height:1.1;letter-spacing:-.04em">Six departments.</h2>
          </div>
          <div style="font-size:13px;color:#1d4ed8;font-weight:800;white-space:nowrap">View all →</div>
        </div>
        <div style="padding:0 16px 32px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div style="aspect-ratio:1;border-radius:16px;background:url('/src/assets/cat-beauty.webp') center/cover;box-shadow:0 8px 24px rgba(15,23,42,.08)"></div>
          <div style="aspect-ratio:1;border-radius:16px;background:url('/src/assets/cat-kitchen.webp') center/cover;box-shadow:0 8px 24px rgba(15,23,42,.08)"></div>
          <div style="aspect-ratio:1;border-radius:16px;background:url('/src/assets/cat-decor.webp') center/cover;box-shadow:0 8px 24px rgba(15,23,42,.08)"></div>
          <div style="aspect-ratio:1;border-radius:16px;background:url('/src/assets/cat-electronics.webp') center/cover;box-shadow:0 8px 24px rgba(15,23,42,.08)"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
