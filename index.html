<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>MARTIFY Super Mart — Pick smart. Shop smart.</title>
    <meta name="description" content="Curated supermarket from Surat — beauty, kitchen, decor, electronics, stationary, toys. Browse, save & inquire on WhatsApp." />
    <link rel="canonical" href="/" />

    <meta property="og:title" content="MARTIFY Super Mart — Pick smart. Shop smart." />
    <meta property="og:description" content="Curated supermarket from Surat. Browse, save & inquire on WhatsApp." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fast font loading without blocking first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" /></noscript>

    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="/src/assets/hero-banner-1.webp" fetchpriority="high" />
  </head>

  <body>
    <div id="root">
      <div style="min-height:100vh;background:#fff;font-family:Manrope,system-ui,sans-serif;color:#0f172a">
        <div style="height:80px;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid #e5e7eb">
          <div style="width:44px;height:44px;border-radius:999px;background:#f1f5f9;animation:martify-pulse 1.2s ease-in-out infinite"></div>
          <div style="width:132px;height:42px;border-radius:10px;background:#f1f5f9;animation:martify-pulse 1.2s ease-in-out infinite"></div>
          <div style="width:44px;height:44px;border-radius:999px;background:#f1f5f9;animation:martify-pulse 1.2s ease-in-out infinite"></div>
        </div>
        <div style="height:42vh;min-height:280px;background:linear-gradient(135deg,#eaf1ff,#f8fafc);padding:28px 16px;display:flex;flex-direction:column;justify-content:flex-end;gap:12px">
          <div style="width:112px;height:14px;border-radius:999px;background:#dbeafe;animation:martify-pulse 1.2s ease-in-out infinite"></div>
          <div style="width:78%;height:34px;border-radius:12px;background:#dbeafe;animation:martify-pulse 1.2s ease-in-out infinite"></div>
          <div style="width:152px;height:40px;border-radius:999px;background:#1d4ed8;opacity:.9"></div>
        </div>
        <div style="padding:32px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div style="aspect-ratio:1;border-radius:16px;background:#f1f5f9;animation:martify-pulse 1.2s ease-in-out infinite"></div>
          <div style="aspect-ratio:1;border-radius:16px;background:#f1f5f9;animation:martify-pulse 1.2s ease-in-out infinite"></div>
          <div style="aspect-ratio:1;border-radius:16px;background:#f1f5f9;animation:martify-pulse 1.2s ease-in-out infinite"></div>
          <div style="aspect-ratio:1;border-radius:16px;background:#f1f5f9;animation:martify-pulse 1.2s ease-in-out infinite"></div>
        </div>
      </div>
    </div>
    <style>@keyframes martify-pulse{50%{opacity:.55}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
